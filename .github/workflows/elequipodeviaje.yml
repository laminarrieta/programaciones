name: El Equipo de Viaje – Productos diarios

on:
  schedule:
    - cron: '0 9 * * *'   # Todos los días a las 9:00 UTC
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub

jobs:
  enviar-productos:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script (una sola vez)
        run: python elequipodeviaje_email_diario_articulos.py --once
